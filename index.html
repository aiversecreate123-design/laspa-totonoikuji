<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LASPA 夏のととのいくじ</title>
  <style>
    :root{
      --bg1:#170d08; --bg2:#3a2117; --gold:#f6d28a; --cream:#fff4dd;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:#170d08;color:var(--cream);}
    body{
      overflow-x:hidden;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,198,107,.22), transparent 28%),
        radial-gradient(circle at 20% 95%, rgba(255,115,53,.18), transparent 30%),
        linear-gradient(160deg, var(--bg1), var(--bg2) 55%, #0b0705);
    }
    .grain{position:fixed;inset:0;pointer-events:none;opacity:.12;background-image:linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px);background-size:34px 34px;mix-blend-mode:overlay}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:22px 16px 34px}
    .card{width:min(430px,100%);border:1px solid rgba(246,210,138,.45);border-radius:28px;padding:24px 18px 22px;background:linear-gradient(180deg,rgba(35,21,13,.86),rgba(16,9,6,.92));box-shadow:0 26px 80px rgba(0,0,0,.48),inset 0 1px 0 rgba(255,255,255,.08);text-align:center;position:relative;overflow:hidden}
    .brand{letter-spacing:.18em;font-size:15px;color:var(--gold);font-weight:800;margin-bottom:6px}
    h1{font-size:31px;line-height:1.15;margin:0 0 6px;text-shadow:0 2px 16px rgba(246,210,138,.22)}
    .sub{font-size:14px;line-height:1.8;color:#f8dfb2;margin:0 0 18px}
    .slotbox{margin:16px auto 18px;padding:15px 12px;border-radius:22px;border:1px solid rgba(246,210,138,.5);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(0,0,0,.18));box-shadow:inset 0 0 24px rgba(0,0,0,.28)}
    .slots{display:flex;gap:10px;justify-content:center}
    .slot{width:86px;height:98px;border-radius:18px;background:linear-gradient(180deg,#fff2ce,#d9ad62);color:#2b1408;display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:inset 0 3px 0 rgba(255,255,255,.45),0 8px 20px rgba(0,0,0,.32);overflow:hidden}
    .slot.spin{animation:spinShake .12s linear infinite}
    @keyframes spinShake{50%{transform:translateY(-2px) scale(1.02)}}
    .btn{appearance:none;border:none;border-radius:999px;padding:17px 30px;background:linear-gradient(180deg,#ffe3a4,#c99038 60%,#8c531d);color:#291204;font-weight:900;font-size:18px;letter-spacing:.05em;box-shadow:0 10px 26px rgba(0,0,0,.38),inset 0 2px 0 rgba(255,255,255,.55);width:100%;max-width:310px}
    .btn:active{transform:translateY(2px)} .btn:disabled{opacity:.65}
    .note{font-size:12px;color:#d8bc87;margin-top:14px;line-height:1.65}
    .result{display:none;margin-top:17px;padding:16px 14px;border-radius:20px;background:rgba(255,246,222,.08);border:1px solid rgba(246,210,138,.38)}
    .result.show{display:block;animation:pop .38s ease-out}
    @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
    .rank{font-size:25px;font-weight:900;color:var(--gold);margin-bottom:8px;text-shadow:0 0 18px rgba(246,210,138,.28)}
    .prize{font-size:21px;font-weight:800;margin-bottom:10px}
    .staff{display:none;font-size:14px;line-height:1.65;margin-top:10px;padding:10px;border-radius:14px;background:rgba(0,0,0,.23);color:#ffe8b8}
    .staff.show{display:block}
    .flash{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,.82);color:#fff}
    .flash.show{display:flex;animation:fadeFlash 1.1s ease both}
    .flashText{text-align:center;font-size:32px;font-weight:1000;line-height:1.35;text-shadow:0 0 18px #fff,0 0 38px var(--gold);animation:zoom .72s ease-out infinite alternate}
    @keyframes zoom{to{transform:scale(1.08)}} @keyframes fadeFlash{0%,100%{opacity:0}15%,85%{opacity:1}}
    .rainbow{background:linear-gradient(90deg,#ff3,#f55,#f0f,#55f,#0ff,#5f5,#ff3);-webkit-background-clip:text;background-clip:text;color:transparent;background-size:220% auto;animation:rainbow 1s linear infinite}
    @keyframes rainbow{to{background-position:220% center}}
    .confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:30}
    .piece{position:absolute;top:-20px;width:9px;height:14px;background:var(--gold);animation:fall 1.8s linear forwards}
    @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
    .footerBtns{display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap}
    .smallbtn{border:1px solid rgba(246,210,138,.35);background:rgba(255,255,255,.06);color:#f5dcaa;border-radius:999px;padding:10px 14px;font-size:13px}
    .coupon{margin-top:12px;border:1px dashed rgba(246,210,138,.75);padding:10px;border-radius:14px;font-size:12px;color:#fce9bf}
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="flash" id="flash"><div class="flashText" id="flashText">🔥 激ととのい<br>チャンス 🔥</div></div>
  <div class="confetti" id="confetti"></div>
  <main class="wrap">
    <section class="card">
      <div class="brand">LASPA</div>
      <h1>🌿 夏のととのいくじ 🌿</h1>
      <p class="sub">サウナ・よもぎ蒸しご利用で<br>その場で1回チャレンジ！</p>
      <div class="slotbox">
        <div class="slots">
          <div class="slot" id="s1">🧖</div>
          <div class="slot" id="s2">🌿</div>
          <div class="slot" id="s3">🧴</div>
        </div>
      </div>
      <button class="btn" id="drawBtn">ガチャを回す</button>
      <div class="result" id="result">
        <div class="rank" id="rank"></div>
        <div class="prize" id="prize"></div>
        <div class="coupon" id="coupon"></div>
        <div class="staff" id="staff"></div>
        <div class="footerBtns">
          <button class="smallbtn" id="againBtn">もう一度表示</button>
          <button class="smallbtn" id="resetBtn">次のお客様へ</button>
        </div>
      </div>
      <p class="note">※景品交換は当日限りです。<br>※スタッフにこの画面をお見せください。</p>
    </section>
  </main>
<script>
const symbols=["🧖","🌿","🧴","🫧","♨️","✨","🔥"];
const prizes=[
 {rank:"🌈 超ととのい賞",prize:"サウナ70分 無料券",weight:1,staff:"スタッフ確認：無料券をお渡しください。",hot:true},
 {rank:"🔥 激ととのい賞",prize:"よもぎ蒸し 無料券",weight:2,staff:"スタッフ確認：無料券をお渡しください。",hot:true},
 {rank:"♨️ ぽかぽか賞",prize:"無料延長30分",weight:7,staff:"スタッフ確認：延長30分を付与してください。"},
 {rank:"🌙 爆睡ととのい賞",prize:"めぐりズム",weight:15,staff:"スタッフ確認：めぐりズムを1点お渡しください。"},
 {rank:"🧴 美肌ととのい賞",prize:"フェイスパック",weight:25,staff:"スタッフ確認：フェイスパックを1点お渡しください。"},
 {rank:"🫧 さっぱり賞",prize:"汗拭きシート",weight:25,staff:"スタッフ確認：汗拭きシートを1点お渡しください。"},
 {rank:"🌿 ほっこり賞",prize:"入浴剤",weight:25,staff:"スタッフ確認：入浴剤を1点お渡しください。"}
];
const $=id=>document.getElementById(id);
const btn=$("drawBtn"),result=$("result"),rank=$("rank"),prize=$("prize"),coupon=$("coupon"),staff=$("staff");
const slots=[$("s1"),$("s2"),$("s3")];
function pickPrize(){const total=prizes.reduce((s,p)=>s+p.weight,0);let r=Math.random()*total;for(const p of prizes){r-=p.weight;if(r<=0)return p;}return prizes[prizes.length-1];}
function beep(type="normal"){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);const now=ctx.currentTime;if(type==="hot"){o.frequency.setValueAtTime(880,now);o.frequency.exponentialRampToValueAtTime(1320,now+.16);o.frequency.exponentialRampToValueAtTime(1760,now+.32);}else{o.frequency.setValueAtTime(440,now);o.frequency.exponentialRampToValueAtTime(700,now+.18);}g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime(.22,now+.03);g.gain.exponentialRampToValueAtTime(.0001,now+.45);o.start(now);o.stop(now+.48);}catch(e){}}
function confetti(){const box=$("confetti");box.innerHTML="";for(let i=0;i<70;i++){const p=document.createElement("div");p.className="piece";p.style.left=Math.random()*100+"vw";p.style.background=["#f6d28a","#fff4dd","#b82f23","#6aa66a","#ff8c42"][Math.floor(Math.random()*5)];p.style.animationDelay=(Math.random()*.45)+"s";p.style.animationDuration=(1.35+Math.random()*1.2)+"s";box.appendChild(p);}setTimeout(()=>box.innerHTML="",2800);}
function flash(text,hot=false){$("flashText").innerHTML=hot?'<span class="rainbow">🌈 超ととのい<br>降臨 🌈</span>':text;$("flash").classList.add("show");setTimeout(()=>$("flash").classList.remove("show"),1050);}
function showResult(p){rank.textContent=p.rank;prize.textContent="🎁 "+p.prize;coupon.textContent="交換コード：LASPA-"+new Date().toLocaleDateString("ja-JP").replaceAll("/","")+"-"+Math.floor(1000+Math.random()*9000);staff.textContent=p.staff;staff.classList.add("show");result.classList.add("show");}
async function draw(){btn.disabled=true;result.classList.remove("show");staff.classList.remove("show");slots.forEach(s=>s.classList.add("spin"));let timer=setInterval(()=>{slots.forEach(s=>s.textContent=symbols[Math.floor(Math.random()*symbols.length)]);},80);const p=pickPrize();await new Promise(r=>setTimeout(r,1450));clearInterval(timer);slots.forEach(s=>s.classList.remove("spin"));if(p.hot||Math.random()<.12){flash("🔥 激ととのい<br>チャンス 🔥",p.rank.includes("超"));beep("hot");await new Promise(r=>setTimeout(r,900));}else{beep("normal");}if(p.rank.includes("超")){slots[0].textContent="🌈";slots[1].textContent="🌈";slots[2].textContent="🌈";}else if(p.rank.includes("激")){slots[0].textContent="🔥";slots[1].textContent="🔥";slots[2].textContent="🔥";}else{slots[0].textContent="🧖";slots[1].textContent="🌿";slots[2].textContent="🧴";}confetti();showResult(p);btn.disabled=false;btn.textContent="もう一度ガチャを回す";}
btn.addEventListener("click",draw);
$("againBtn").addEventListener("click",()=>result.classList.toggle("show"));
$("resetBtn").addEventListener("click",()=>{result.classList.remove("show");btn.textContent="ガチャを回す";slots[0].textContent="🧖";slots[1].textContent="🌿";slots[2].textContent="🧴";window.scrollTo({top:0,behavior:"smooth"});});
</script>
</body>
</html>
